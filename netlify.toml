# Buildinstellingen in code, zodat ze niet in de interface hoeven te staan.
# Netlify leest dit bestand en negeert afwijkende UI-instellingen.

[build]
  command = "python3 build.py"
  publish = "_site"

[build.environment]
  PYTHON_VERSION = "3.11"

# _redirects en robots.txt komen uit publish/ en worden door build.py
# naar _site/ gekopieerd. Headers horen wel hier thuis.

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=604800"

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
